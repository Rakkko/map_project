<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <script src="maplibre-gl.js"></script>
    <link href="maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: '/styles/style-martin.json',
            center: [0, 0],
            zoom: 2
        });
    </script>
</body>

</html>
