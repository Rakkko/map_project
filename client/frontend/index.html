<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <script src="maplibre-gl.js"></script>
    <link href="maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        fetch('/styles/style.json')
            .then(r => r.json())
            .then(style => {

                const base = window.location.origin;

                style.sources.martin.tiles = [base + '/tiles/tiles/{z}/{x}/{y}'];

                style.sprite = base + '/sprites/sprite';
                style.glyphs = base + '/glyphs/{fontstack}/{range}.pbf';

                new maplibregl.Map({
                    container: 'map',
                    style: style,
                    center: [0, 0],
                    zoom: 2
                });
            });
    </script>
</body>

</html>
